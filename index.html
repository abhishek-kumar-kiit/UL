<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.svg" alt="Recipe Logo" class="logo">
    <h1>Recipe Cards</h1>
</header>

<div class="controls">
    <input type="text" id="search" placeholder="Search recipes...">
    <label for="filter">Filter recipes:</label>
    <select id="filter">
        <option value="all">All</option>
        <option value="veg">Veg</option>
        <option value="non-veg">Non-Veg</option>
        <option value="quick">Quick</option>
        <option value="budget">Budget</option>
        <option value="favorites">Favorites</option>
    </select>
</div>

<main id="recipe-list" class="grid"></main>

<!-- Modal -->
<div id="recipe-modal" class="modal">
    <div class="modal-content">
        <span id="close-modal">&times;</span>
        <h2 id="modal-title"></h2>
        <img id="modal-image" alt="Recipe Image">
        <h3>Ingredients</h3>
        <ul id="modal-ingredients"></ul>
        <h3>Steps</h3>
        <ol id="modal-steps"></ol>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
